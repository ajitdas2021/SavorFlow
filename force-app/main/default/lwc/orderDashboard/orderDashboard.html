<template>
    <lightning-card title="Order Dashboard" icon-name="standard:orders">
        <div class="slds-m-around_medium">
            <template if:true={orders}>
                <lightning-datatable
                    key-field="Id"
                    data={orders}
                    columns={columns}
                    hide-checkbox-column
                    onrowaction={handleRowAction}>
                </lightning-datatable>
            </template>
            <template if:true={error}>
                <p>Error loading orders.</p>
            </template>
        </div>
    </lightning-card>
</template>
